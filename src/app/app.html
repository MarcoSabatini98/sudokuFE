<mat-toolbar class="app-toolbar">
  <a routerLink="/" class="brand">
    <img src="sudoku-icon.png" alt="Sudoku" class="brand-logo">
    <span class="brand-text">Sudoku</span>
  </a>
  <span class="spacer"></span>
  <a mat-button routerLink="/" routerLinkActive="active-link" [routerLinkActiveOptions]="{ exact: true }">Home</a>
  <a mat-button routerLink="/history" routerLinkActive="active-link">Cronologia</a>
  <a mat-button routerLink="/records" routerLinkActive="active-link">Record</a>
  <button mat-button class="theme-btn" (click)="themeService.toggle()" [title]="themeService.darkMode() ? 'Passa al tema chiaro' : 'Passa al tema scuro'">
    {{ themeService.darkMode() ? '☀️' : '🌙' }}
  </button>
</mat-toolbar>

<main class="app-content">
  <router-outlet />
</main>
