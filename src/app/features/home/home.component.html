<div class="home-container">
  <h1 class="title">Sudoku</h1>
  <p class="subtitle">Scegli la difficoltà per iniziare</p>

  <div class="nav-links">
    <a mat-button routerLink="/history">Cronologia</a>
    <a mat-button routerLink="/records">Record</a>
  </div>

  <div class="difficulty-list">
    @for (diff of difficulties; track diff) {
      <mat-card class="difficulty-card" (click)="startGame(diff)">
        <mat-card-content class="card-content">
          <div class="diff-label">{{ labels[diff] }}</div>
          @if (diff === 'easy' || diff === 'medium') {
            <p class="diff-note">{{ difficultyNotes[diff] }}</p>
          } @else {
            @if (isRevealed(diff)) {
              <p class="diff-note revealed">{{ difficultyNotes[diff] }}</p>
            } @else {
              <button class="reveal-btn" (click)="revealNote(diff, $event)">
                {{ revealButtonLabel(diff) }}
              </button>
            }
          }
        </mat-card-content>
      </mat-card>
    }
  </div>
</div>
