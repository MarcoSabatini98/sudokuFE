<div class="hub-container">
  <h1 class="title">Giochi</h1>
  <p class="subtitle">Scegli cosa giocare</p>

  <div class="game-list">
    @for (game of games; track game.key) {
      <mat-card class="game-card" (click)="open(game)">
        <mat-card-content class="card-content">
          <div class="game-title">{{ game.title }}</div>
          <div class="game-desc">{{ game.description }}</div>
          @if (game.badge) {
            <span class="badge">{{ game.badge }}</span>
          }
        </mat-card-content>
      </mat-card>
    }
  </div>
</div>
